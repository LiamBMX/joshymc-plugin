# Custom Spawners — these are SEPARATE from vanilla spawners.
# Vanilla spawners (found in dungeons, mineshafts, etc.) still work normally:
# they spawn mobs, can be silk-touched, and have no GUI.
#
# Custom spawners are bought from /spawner (shop GUI) or given by admins. They:
#   - Don't spawn mobs (they generate drops directly into a storage chest)
#   - Have a right-click GUI for storage / sell-all / disable
#   - Are owner-locked (only the player who placed it can pick it up)
#   - Stack on top of each other
#   - Integrate with hoppers (place a hopper below to auto-extract)
#
# Each spawner type below defines its mob, drops, timing, and shop price.
#
# Fields:
#   display-name: Item name in inventory and GUI title
#   mob: Vanilla EntityType used for the spinning mob inside the spawner
#   interval-seconds: How often drops are generated (default 30)
#   buy-price: Cost to purchase from /spawner shop (omit or set to -1 to hide)
#   drops-per-interval:
#     min: Minimum drop rolls per interval
#     max: Maximum drop rolls per interval (random in range)
#   drops:
#     - material: Bukkit Material name
#       amount: How many per roll (default 1)
#       sell-price: Sell value per item via "Sell All"
#       chance: 0.0-1.0 probability (default 1.0)

spawners:
  zombie:
    display-name: "&aZombie Spawner"
    mob: ZOMBIE
    interval-seconds: 30
    buy-price: 25000
    drops-per-interval:
