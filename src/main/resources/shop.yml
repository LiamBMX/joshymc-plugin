# JoshyMC Shop Configuration
# Economy philosophy: Grind-heavy, farming-meta, high numbers
# - $10M = "rich", billions achievable with heavy grinding, trillions nearly impossible
# - Farming/renewable resources are THE BEST money makers ($500K/hr target for good farms)
# - Processed items worth more than raw materials
# - Buy prices are 2.5-3x sell prices
