# Resource pack — served automatically by the plugin
# The plugin bundles the pack and hosts it via a built-in HTTP server.
# port: the port the HTTP server listens on (default 8163)
# host: the hostname/IP players use to download the pack
#       leave blank for "localhost" (local testing)
#       set to your server's public IP or domain for production
resource-pack:
  port: 8163
  host: ""

# Global prefix for all in-game plugin messages
prefix: "&b&lJoshyMC &8» &r"

# Feature Toggles — set to false to disable a system entirely
features:
  talismans: true
  custom-fishing: true
  skills: true
  quests: true
  market: true
  trails: true
  kill-effects: true
  join-effects: true
  emotes: true
  glow: true
  gadgets: true
  custom-enchants: true
  anticheat: true
  combat-log-npc: true
  resource-world: true
  voting: true
  portals: true
  arenas: true
  npcs: false
  chat-games: true

# Chat formatting
chat:
  # Format for player messages. Placeholders: {prefix}, {suffix}, {tag}, {player}, {message}
  format: "{prefix}{tag}{player}{suffix} &8» &f{message}"

discord:
  # Bot token from https://discord.com/developers/applications
  token: "YOUR_BOT_TOKEN_HERE"

  # Channel ID for chat bridge + events (all in one channel)
  channel-id: "000000000000000000"

  # Format for messages sent TO Discord from Minecraft
  # Placeholders: {player}, {message}
  chat-format: "**{player}** » {message}"

  # Format for messages sent TO Minecraft from Discord
  # Placeholders: {name}, {message}
  minecraft-format: "&9[Discord] &f{name} &7» &f{message}"

# Recipe Blocker — block players from crafting specific items
# Use material names from: https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html
recipe-blocker:
  blocked-items:
    # - TNT
    # - END_CRYSTAL

# Combat — PvP toggle, combat tagging, flight/elytra disable
combat:
  tag-duration-seconds: 15

# External plugin integrations
integrations:
  # Grim AntiCheat — when JoshyMC sees Grim is installed, it auto-injects a
  # bridge command into Grim's punishments.yml so Grim's flags also show up
  # in JoshyMC's /admin → Top Violators list. Idempotent + non-destructive
  # (only adds an entry, never removes anything). Set false if you want to
  # configure Grim's punishments.yml manually.
  grim:
    auto-install: true

# Chat games — periodic chat-typing puzzles for online players
# Game types: math, unscramble, type-this-token, reverse-this-word
# An admin can manually trigger games with /chatgame [type].
chat-games:
  enabled: true
  # How often the auto-scheduler triggers a game when no game is running
  # and at least min-players are online. Floors at 30s. The legacy
  # `interval-minutes` field still works for older configs.
  interval-seconds: 900
  # Minimum online players required for the auto-scheduler to fire a game.
  # Manual /chatgame ignores this.
  min-players: 2
  # Auto-expire a game if no one solves it within this many seconds.
  solve-window-seconds: 60
  reward:
    money: 1000
    xp: 25

# Crates — debug toggles
# debug-interactions: when true, every right-click on a registered crate (or
# fuzzy-matched neighbour) is logged to the server console with the player,
# coords, hand, key state, and event-cancellation status. Useful for tracking
# down "right-clicking my spawn crate doesn't open the GUI" — leave off in
# production.
crates:
  debug-interactions: false

# Lag Cleaner — entity-threshold-based, only clears when needed
# Checks entity counts every check-interval-seconds
# Triggers a 30s countdown (with warnings at 30s, 10s, 3s) when thresholds are exceeded
# Protected entities: villagers, NPCs, ender dragon, wither, armor stands, named/leashed mobs
#
# Defaults are intentionally generous — most servers only run into lag at much
# higher counts. Lower these if your server has < 1GB heap or you see TPS drops
# from mob crowding. Raise them if cleanups are firing too often.
lag-cleaner:
  enabled: true
  entity-threshold: 1500
  item-threshold: 800
  check-interval-seconds: 60

# Mining — Veinminer, Auto Smelt, Tree Feller
mining:
  veinminer-max-blocks: 64
  treefeller-max-logs: 128

# Warps — player warps limit (server warps are unlimited, admin only)
# limits-by-rank: per-rank override. Use -1 for unlimited. Falls back to player-max-per-player if a rank has no entry.
warps:
  player-max-per-player: 3
  limits-by-rank:
    owner: -1
    admin: -1
    mod: -1
    helper: 5
    vip: 5
    member: 3
    default: 3

# Homes
# limits-by-rank: per-rank override. Use -1 for unlimited. Falls back to max-per-player if a rank has no entry.
homes:
  max-per-player: 3
  limits-by-rank:
    owner: -1
    admin: -1
    mod: -1
    helper: 5
    vip: 5
    member: 3
    default: 3

# AFK — rewards per interval while AFK. Configure any combination of money,
# items, and XP. Leave a reward at 0 / empty to skip it.
afk:
  world: "afk"
  reward:
    enabled: true
    interval: 10
    unit: "seconds"       # "seconds" or "minutes"
    money: 0              # money paid per interval (0 = none)
    xp: 0                 # vanilla XP levels per interval (0 = none)
    # Legacy single-item fields (kept for backwards compatibility).
    # If `items` below is non-empty it takes precedence and these are ignored.
    item: DIRT
    amount: 1
    # Full items list — each entry supports material, amount, chance (0-100).
    # Entries with chance < 100 roll independently each interval.
    #
    # `material` accepts three formats:
    #   1. Bukkit material  — DIRT, IRON_INGOT, DIAMOND, etc.
    #   2. Custom item id   — easter_egg, void_drill, money_pouch_small, etc.
    #   3. Crate key        — crate:vote, key:afk  (must match a crate type)
    items:
      - material: DIRT
        amount: 1
        chance: 100
      # - material: IRON_INGOT
      #   amount: 1
      #   chance: 25
      # - material: easter_egg
      #   amount: 1
      #   chance: 10
      # - material: "key:afk"
      #   amount: 1
      #   chance: 100

# Player Vaults
vaults:
  max: 10

# RTP — Random Teleport
rtp:
  min-range: 500
  max-range: 5000
  cooldown-seconds: 60

# Auction House
auction:
  listing-duration-hours: 48
  max-listings-per-player: 10
  min-price: 1
  max-price: 1000000000
  tax-percent: 5

# Spawn World — auto-loads a schematic into a flat world
spawn-world:
  enabled: true
  schematic: "GETAWXY_LOBBY.schem"
  paste-x: 0
  paste-y: 64
  paste-z: 0

# Worlds where player-vs-player COLLISIONS are disabled by default.
# Players standing on the same block / running through each other won't push.
# Exceptions: collisions are auto-RE-ENABLED whenever a player is
#   - inside a PvP arena polygon, or
#   - currently combat-tagged
# So spawn / lobby can be friction-free without breaking PvP.
worlds:
  no-collision:
    - spawn

# World Borders — per-dimension, in blocks (full diameter)
# Applied on plugin start. The resource world also re-applies on regen.
world-borders:
  overworld: 10000
  resource: 10000
  nether: 10000
  end: 10000

# Resource World — resets periodically, has all structures
resource-world:
  enabled: true
  reset-interval-hours: 24
  world-name: "resource"
  border-size: 5000

# Auto Announcements — rotating broadcast messages
# Two formats are supported per message:
#   - "plain text"                                  (uses default-sound)
#   - text: "..."  sound: ENTITY_EXPERIENCE_ORB_PICKUP  volume: 1.0  pitch: 1.5
# Sound names: https://jd.papermc.io/paper/1.21/org/bukkit/Sound.html
announcements:
  enabled: true
  interval-seconds: 300
  default-sound: BLOCK_NOTE_BLOCK_BELL
  messages:
    - text: "&fCHECK OUT &6/SHOP &fFOR GREAT DEALS!"
      sound: ENTITY_EXPERIENCE_ORB_PICKUP
      volume: 1.0
      pitch: 1.0
    - text: "&fJOIN OUR DISCORD FOR UPDATES!"
      sound: BLOCK_NOTE_BLOCK_PLING
      volume: 1.0
      pitch: 1.5
    - "&fUSE &6/TPA &fTO TELEPORT TO FRIENDS!"
    - "&fPROTECT YOUR BUILDS WITH &6/CLAIM WAND&f!"
    - "&fSELL ITEMS QUICKLY WITH &6/SELL&f!"

# Welcome / MOTD — join/leave messages
welcome:
  first-join-message: "&6&l★ &eWelcome &f{player} &eto JoshyMC! &6&l★"
  first-join-broadcast: true
  join-format: "&8[&a+&8] &7{player}"
  leave-format: "&8[&c-&8] &7{player}"
  motd:
    - ""
    - "&b&lWelcome to JoshyMC!"
    - "&7Type &6/shop &7to buy items"
    - "&7Type &6/claim wand &7to protect your builds"
    - "&7Type &6/kit &7to get starter items"
    - ""

# Voting — reward players for voting
#
# Two ways a vote site can deliver votes to this server:
#
# 1. HTTP callback (simple, some sites support it)
#    URL: http://<your-ip>:<port>/vote?username=<name>&key=<secret-key>&service=<site>
#    Controlled by `port` + `secret-key` below.
#
# 2. Votifier protocol (standard, what most sites use) — see `votifier` below.
#    This is 1:1 with NuVotifier — v1 (RSA) and v2 (token) both supported.
#    Keys and tokens are stored under plugins/Joshymc/votifier/.
voting:
  enabled: true
  # JoshyMC's vote rewards GUI is exposed under `/jvote` (alias `/joshyvote`)
  # only — the unprefixed `/vote` alias is left to other voting plugins
  # (NuVotifier, VotingPlugin, etc.) so they can never be hijacked.
  port: 8192
  secret-key: "change-me-to-a-random-string"
  # Votifier-compatible TCP listener. Most vote sites speak this protocol.
  votifier:
    enabled: false
    # Traditional Votifier port is 8192, but the HTTP callback above already uses
    # that — so Votifier defaults to 8193. Point your vote sites at THIS port.
    port: 8193
    # v2 tokens. Create one per vote site (or use "default" for all).
    # Copy the token value into the vote site's Votifier/NuVotifier settings.
    # The v1 RSA public key is auto-generated on first start at
    # plugins/Joshymc/votifier/public.key — paste its contents into any v1 site.
    tokens:
      default: "change-me-to-a-long-random-string"
  vote-links:
    - name: "MinecraftServers.org"
      url: "https://minecraftservers.org/vote/joshymc"
    - name: "Planet Minecraft"
      url: "https://planetminecraft.com/server/joshymc/vote"
  rewards:
    money: 25000
    claim-blocks: 50
    items:
      - "money_pouch_small:1"
  streak-bonuses:
    7: 100000
    14: 250000
    30: 1000000

# Claims — block-based land protection with golden shovel
claims:
  starting-blocks: 500     # Claim blocks each player starts with
  blocks-per-hour: 100     # Blocks earned per hour of playtime
  max-blocks: 50000        # Maximum total claim blocks a player can have

# Ranks — displayed as chat tags before the player's name
# Tag uses & color codes (e.g., &c = red, &l = bold, &a = green)
# OR hex colors with &#RRGGBB format (e.g., &#FF5555&lAdmin for hex red bold)
# Weight determines display priority (higher = more important)
ranks:
  list:
    owner:
      tag: "&4&lOwner"
      weight: 100
    admin:
      tag: "&c&lAdmin"
      weight: 90
    mod:
      tag: "&9&lMod"
      weight: 80
    helper:
      tag: "&a&lHelper"
      weight: 70
    vip:
      tag: "&6&lVIP"
      weight: 50
    member:
      tag: "&7Member"
      weight: 10
    default:
      tag: "&8Player"
      weight: 0

# Auto Restart — periodically restart the server to prevent memory-related disconnects
auto-restart:
  enabled: true
  # How often to restart (hours). Default: 12
  interval-hours: 12.0
  # How many seconds before restart to begin the countdown broadcast. Default: 300 (5 min)
  warning-seconds: 300

# AntiCheat — server-side cheat detection
anticheat:
  enabled: true
  alert-vl: 20          # VL threshold to alert staff
  kick-vl: 150          # VL threshold to kick player (very high to avoid false kicks)
  alert-cooldown-ms: 3000  # Cooldown between alerts per check per player
  checks:
    flight: true         # Detects fly hacks (sustained air time, ascending without jump)
    speed: true          # Detects speed hacks (moving faster than possible)
    nofall: true         # Detects NoFall (spoofing ground status to avoid fall damage)
    jesus: true          # Detects water/lava walking
    phase: true          # Detects noclip/phase through solid blocks
    timer: true          # Detects timer hacks (modified tick rate, >20 packets/sec)
    killaura: true       # Detects KillAura (attack rate, hitting behind back)
    reach: true          # Detects reach hacks (hitting/breaking from too far)
    autoclick: true      # Detects autoclickers (>22 CPS)
    velocity: true       # Detects anti-knockback (not moving after being hit)
    fastbreak: true      # Detects fast block breaking
    fastplace: true      # Detects fast block placing (>18 blocks/sec)
    scaffold: true       # Detects scaffold hacks (bridging at impossible speed)
    nuker: true          # Detects nuker (breaking >80 blocks/sec)
    badpackets: true     # Detects invalid packets (impossible pitch, actions while dead)
    illegitems: true     # Detects illegal items (over-enchanted, stacked unstackables)
    inventory: true      # Detects inventory hacks (>25 clicks/sec)
