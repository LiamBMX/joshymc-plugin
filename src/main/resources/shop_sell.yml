# JoshyMC Shop - Sell-Only Items
# This file is loaded alongside shop.yml so sell-only items can be kept
# separate from the main buy/sell catalog. Categories here work exactly
# like shop.yml (name, icon, items with buy/sell), but are meant for
# items you only want players to be able to SELL.
# buy: 0 means not buyable, sell: 0 means not sellable.
#
# The buy shop (/shop) is buy-only - it no longer sells items directly.
# /sell (and the sell wand / auto-sellers) look ONLY at this file to
# decide what can be sold and for how much. Prices below were migrated
# from shop.yml's old "sell" values so nothing changes for players.

