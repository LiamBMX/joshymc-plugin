  joshymc.trail.category.music: { description: All Music trails, default: op }
  joshymc.trail.category.water: { description: All Water trails, default: op }
  joshymc.trail.category.electric: { description: All Electric trails, default: op }
  joshymc.trail.category.mythic: { description: All Mythic trails, default: op }
  joshymc.trail.flame: { default: op }
  joshymc.trail.fire_trail: { default: op }
  joshymc.trail.blaze: { default: op }
  joshymc.trail.inferno: { default: op }
  joshymc.trail.ember_glow: { default: op }
  joshymc.trail.magma_walk: { default: op }
  joshymc.trail.snowflake: { default: op }
  joshymc.trail.frost: { default: op }
