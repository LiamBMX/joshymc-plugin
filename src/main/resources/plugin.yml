  # ─── Cosmetics: per-item and per-category permissions ───────────────
  # Base perms (joshymc.trail, joshymc.killeffect, etc.) above control the
  # command / GUI access. The perms below control which specific cosmetics
  # a player may equip. Grant category/wildcard perms to unlock groups.

  # Trails
  joshymc.trail.*: { description: All trails, default: op }
  joshymc.trail.category.fire: { description: All Fire trails, default: op }
  joshymc.trail.category.ice: { description: All Ice trails, default: op }
  joshymc.trail.category.nature: { description: All Nature trails, default: op }
  joshymc.trail.category.dark: { description: All Dark trails, default: op }
  joshymc.trail.category.light: { description: All Light trails, default: op }
