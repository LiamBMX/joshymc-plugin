name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.49). Leave blank for a build-only run with no release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF"
          fi
          # Strip leading "v" if present
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage release JAR
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        run: |
          mkdir -p release
          cp build/libs/joshymc-1.0-SNAPSHOT-all.jar "release/joshymc-${{ steps.ver.outputs.version }}.jar"
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: joshymc-jar
          path: build/libs/joshymc-1.0-SNAPSHOT-all.jar

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: release/joshymc-${{ steps.ver.outputs.version }}.jar
