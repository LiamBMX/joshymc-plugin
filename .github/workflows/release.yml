name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.49). Leave blank for a build-only run with no release.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Inspect build outputs
        if: always()
        run: |
          echo "--- jar/ ---"
          ls -la jar/ 2>/dev/null || echo "(no jar/ dir)"
          echo "--- build/libs/ ---"
          ls -la build/libs/ 2>/dev/null || echo "(no build/libs dir)"

      - name: Resolve version
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF"
          fi
          # Strip leading "v" if present
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage release JAR
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        run: |
          mkdir -p release
          # build.gradle.kts redirects shadowJar output to top-level jar/ dir
          SRC=$(ls jar/joshymc-*-all.jar 2>/dev/null | head -n1)
          if [ -z "$SRC" ]; then
            echo "::error::No shaded JAR found under jar/"
            exit 1
          fi
          cp "$SRC" "release/joshymc-${{ steps.ver.outputs.version }}.jar"
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: joshymc-jar
          path: jar/joshymc-*-all.jar

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: release/joshymc-${{ steps.ver.outputs.version }}.jar

      - name: Dispatch Discord notification
        # softprops/action-gh-release creates the release via GITHUB_TOKEN, so the
        # `release: published` event is suppressed (anti-recursion). Dispatch the
        # notify workflow directly — workflow_dispatch is exempt from that rule.
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run notify-discord.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="${{ steps.ver.outputs.tag }}"
