name: Auto-release after Claude PR merge

# When a `claude/*` PR merges to main, bump the patch version (v1.0.X -> v1.0.X+1)
# and dispatch the existing Release workflow, which builds the shaded JAR
# and publishes a GitHub release with the artifact attached.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Compute next version
        id: ver
        run: |
          set -euo pipefail
          LATEST=$(git tag --sort=-v:refname | grep -E '^v1\.0\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.1"
          else
            BASE=${LATEST#v1.0.}
            NEXT="v1.0.$((BASE + 1))"
          fi
          echo "Latest: ${LATEST:-none}  Next: $NEXT"
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Dispatch Release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="${{ steps.ver.outputs.tag }}"

      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body "Auto-release dispatched: \`${{ steps.ver.outputs.tag }}\`. JAR will appear under [Releases](https://github.com/${{ github.repository }}/releases) once the Release workflow completes."
