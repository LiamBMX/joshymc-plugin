name: Auto-merge Claude PRs

# Fires when CI completes on a PR. Merges the PR if all gates pass:
#  - CI was successful
#  - Head branch starts with `claude/`
#  - No `do-not-auto-merge` label
#  - No files under sensitive paths (build infra, workflows)
#
# After merge, also handles:
#  - Closing the linked issue (parsed from `claude/issue-N` branch name).
#    We can't rely on GitHub's "Closes #N" auto-magic because Claude doesn't
#    always include the keyword in PR bodies.
#  - Dispatching the Release workflow with a bumped patch version. We can't
#    use a separate `pull_request: closed` workflow because GITHUB_TOKEN-
#    driven merges don't trigger downstream workflows (anti-recursion),
#    but `workflow_dispatch` IS exempt from that rule.
#
# Safe-by-design: a human PR from any non-`claude/*` branch never auto-merges,
# and a Claude PR touching the build pipeline itself is blocked too.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Identify PR, merge, close issue, dispatch release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail

          # Find the open PR for this branch
          PR_NUMBER=$(gh pr list \
            --repo "$REPO" \
            --head "$HEAD_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch $HEAD_BRANCH"
            exit 0
          fi

          echo "Considering PR #$PR_NUMBER (branch: $HEAD_BRANCH)"

          # Gate 1: branch must start with claude/
          case "$HEAD_BRANCH" in
            claude/*) ;;
            *)
              echo "Branch does not start with claude/; skipping"
              exit 0
              ;;
          esac

          # Gate 2: no do-not-auto-merge label
          if gh pr view "$PR_NUMBER" --repo "$REPO" --json labels \
              --jq '.labels[].name' | grep -qx 'do-not-auto-merge'; then
            echo "Label do-not-auto-merge present; skipping"
            exit 0
          fi

          # Gate 3: no sensitive paths
          FILES=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files \
            --jq '.files[].path')
          SENSITIVE='^(\.github/workflows/|gradle/wrapper/|build\.gradle\.kts$|settings\.gradle\.kts$|gradlew(\.bat)?$)'
          if echo "$FILES" | grep -qE "$SENSITIVE"; then
            echo "Sensitive paths touched, blocking auto-merge:"
            echo "$FILES" | grep -E "$SENSITIVE" || true
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              "Auto-merge skipped: PR touches sensitive paths (build infra / workflows). Human review required."
            exit 0
          fi

          echo "All gates passed; merging PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --repo "$REPO" --squash --delete-branch

          # ---- post-merge tasks ----

          # Close linked issue: parse N from `claude/issue-N`
          ISSUE_N=$(echo "$HEAD_BRANCH" | sed -nE 's|^claude/issue-([0-9]+)$|\1|p')
          if [ -n "$ISSUE_N" ]; then
            # Strip in-progress / in-review labels so closed issues don't show stale state
            gh issue edit "$ISSUE_N" --repo "$REPO" \
              --remove-label "🔨 in-progress" 2>/dev/null || true
            gh issue edit "$ISSUE_N" --repo "$REPO" \
              --remove-label "📝 in-review"   2>/dev/null || true

            if gh issue view "$ISSUE_N" --repo "$REPO" --json state --jq '.state' | grep -qx 'OPEN'; then
              echo "Closing linked issue #$ISSUE_N"
              gh issue close "$ISSUE_N" --repo "$REPO" \
                --reason completed \
                --comment "Closed automatically by merge of #$PR_NUMBER."
            else
              echo "Issue #$ISSUE_N already closed; skipping"
            fi
          else
            echo "Branch name doesn't match claude/issue-N; no issue to close"
          fi

          # Compute next version (v1.0.X -> v1.0.X+1) and dispatch Release
          git fetch --tags origin
          LATEST=$(git tag --sort=-v:refname | grep -E '^v1\.0\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="v1.0.1"
          else
            BASE=${LATEST#v1.0.}
            NEXT="v1.0.$((BASE + 1))"
          fi
          echo "Latest tag: ${LATEST:-none}  Next: $NEXT"

          gh workflow run release.yml \
            --repo "$REPO" \
            --ref main \
            -f tag="$NEXT"

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
            "Auto-release dispatched: \`$NEXT\`. JAR will appear in [Releases](https://github.com/$REPO/releases) once the Release workflow finishes."
