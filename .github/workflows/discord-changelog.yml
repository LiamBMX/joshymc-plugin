name: Discord changelog
on:
  release:
    types: [published, released]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Send Discord embed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPO: ${{ github.repository }}
          DISPATCH_TAG: ${{ inputs.tag }}
          RELEASE_TAG_FROM_EVENT: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${DISPATCH_TAG:-$RELEASE_TAG_FROM_EVENT}"
          echo "Notifying for $TAG"

          gh release view "$TAG" --repo "$REPO" \
            --json name,body,url,publishedAt,author,assets > release.json

          RELEASE_NAME=$(jq -r '.name // ""' release.json)
          RELEASE_URL=$(jq -r '.url // ""' release.json)
          RELEASE_BODY=$(jq -r '.body // ""' release.json)
          RELEASE_PUBLISHED=$(jq -r '.publishedAt // ""' release.json)
          RELEASE_AUTHOR=$(jq -r '.author.login // "github-actions"' release.json)
          JAR_NAME=$(jq -r '[.assets[] | select(.name | endswith(".jar"))][0].name // ""' release.json)
          JAR_URL=$(jq -r '[.assets[] | select(.name | endswith(".jar"))][0].url // ""' release.json)

          TITLE_DISPLAY="${RELEASE_NAME:-$TAG}"
          DESCRIPTION=$(printf '%s' "$RELEASE_BODY" | head -c 3800)

          if [ -n "$JAR_NAME" ] && [ -n "$JAR_URL" ]; then
            DOWNLOAD_FIELD="[\`${JAR_NAME}\`](${JAR_URL})"
          else
            DOWNLOAD_FIELD="(no JAR attached)"
          fi

          jq -n \
            --arg title       "Release $TITLE_DISPLAY" \
            --arg description "$DESCRIPTION" \
            --arg url         "$RELEASE_URL" \
            --arg download    "$DOWNLOAD_FIELD" \
            --arg released_by "$RELEASE_AUTHOR" \
            --arg ts          "$RELEASE_PUBLISHED" \
            --arg tag         "$TAG" \
            --arg repo        "$REPO" \
            '{
              username: "JoshyMC Releases",
              embeds: [{
                title: $title,
                description: $description,
                url: $url,
                color: 3066993,
                fields: [
                  { name: "Download",    value: $download,    inline: true },
                  { name: "Tag",         value: $tag,         inline: true },
                  { name: "Released by", value: $released_by, inline: true }
                ],
                author: { name: "JoshyMC Plugin", url: ("https://github.com/" + $repo) },
                footer: { text: ("github.com/" + $repo) },
                timestamp: $ts
              }]
            }' > payload.json

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST -H "Content-Type: application/json" \
            --data @payload.json \
            "$WEBHOOK")
          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 300 ]; then
            echo "Discord webhook failed:"
            cat response.txt
            exit 1
          fi
