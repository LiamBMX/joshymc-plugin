name: Claude

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  claude:
    # Author gating: only fire for OWNER / COLLABORATOR / MEMBER on a public repo.
    # New issues run. Comments/reviews run if they mention @claude.
    # PR open/sync runs only for claude/* branches (Claude's own PRs).
    if: |
      (github.event_name == 'issues' && (
        github.event.issue.author_association == 'OWNER' ||
        github.event.issue.author_association == 'COLLABORATOR' ||
        github.event.issue.author_association == 'MEMBER'
      )) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER'
      )) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR' ||
        github.event.comment.author_association == 'MEMBER'
      )) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && (
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'COLLABORATOR' ||
        github.event.review.author_association == 'MEMBER'
      )) ||
      (github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'claude/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Allow the Claude GitHub App itself to trigger this workflow, so
          # issues Claude opens during triage cascade-fix without manual nudge.
          allowed_bots: 'claude'
          claude_args: '--allowed-tools "Bash(./gradlew:*),Bash(git:*),Bash(gh:*),Bash(cp:*),Bash(ls:*),Bash(cat:*),Bash(mkdir:*),Edit,Write,Read,Glob,Grep"'
          prompt: |
            You are working on the JoshyMC Paper plugin repo. The project's
            CLAUDE.md describes the codebase, conventions, and the established
            release workflow — read it before acting.

            Trigger context:
              event:        ${{ github.event_name }}
              issue/PR #:   ${{ github.event.issue.number || github.event.pull_request.number }}
              title:        ${{ github.event.issue.title || github.event.pull_request.title }}

            What to do:

            1. If this was triggered by a newly opened issue:
               - Read the issue, investigate the repo.
               - If it's not actionable (a question, vague, a duplicate),
                 comment on the issue explaining and stop.
               - Otherwise, create a branch `claude/issue-<number>`, implement
                 the fix, run `./gradlew build` to verify it compiles, and open
                 a PR that says "Closes #<number>". Do NOT cut a release —
                 humans review and merge first.

               Stay conservative: a bug fix doesn't need surrounding cleanup,
               and small changes are easier to review. Match existing style
               (Adventure API, commsManager.send, Kotlin only, no legacy
               ChatColor — CLAUDE.md has the full list).

            2. If this was triggered by a pull_request (head branch
               `claude/*`, your own PR):
               - This is review mode. Read the PR diff, the linked issue,
                 and the relevant code. Check for: obvious bugs, behavior
                 that doesn't match the issue, places you should have used
                 commsManager.send / Adventure API but used legacy ChatColor,
                 Bukkit gotchas listed in CLAUDE.md (hand-filtering events,
                 mutual-exclusivity of teams, etc.).
               - Post ONE consolidated review comment summarizing findings.
                 If the PR is good, post a short "looks good" review.
                 If there's a real problem, request changes and describe
                 the fix; do NOT push commits during review (the auto-merge
                 happens once CI is green — wait for the human to read your
                 review if they want).
               - You do NOT need to gate the merge yourself. CI is the hard
                 gate; auto-merge fires when CI is green.

            3. If this was triggered by an `@claude` mention in a comment:
               - Do whatever was asked in the comment.
               - If the ask is "cut a release" / "ship it" / "release this":
                 The repo has a `release.yml` workflow that triggers on any
                 `v*` tag push and handles building, JAR upload, and release
                 creation. So you just need to push the tag:
                   * Find latest: `git tag --sort=-v:refname | head -1`
                   * Increment patch (e.g. v1.0.51 -> v1.0.52)
                   * `git tag v1.0.<N> && git push origin v1.0.<N>`
                 Only release from `main` (or right after merging a PR to
                 main). Never release from an unmerged feature branch.

            Hard rules:
              - Never force-push, never bypass hooks, never commit secrets.
              - Don't touch anything under `.github/workflows/` without an
                explicit human ask — that's the loop you're running in,
                and PRs that change workflows are blocked from auto-merge.
              - Don't touch `build.gradle.kts`, `settings.gradle.kts`, or
                `gradle/wrapper/**` without explicit ask — same reason.
